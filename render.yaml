services:
  - type: web
    name: kleiderschrank
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: services/api
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORCE_SECURE_COOKIES
        value: "true"
      - key: PUBLIC_BASE_URL
        sync: false
    disk:
      name: kleiderschrank-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
